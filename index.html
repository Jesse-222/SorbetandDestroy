<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tip Sorbet &amp; Destroy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Caveat:wght@600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    /* ─ RESET ─ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    /* ─ BRAND COLORS ─ */
    :root {
      --neon: #E8FF00;
      --hot-pink: #FF3399;
      --script-green: #33CC66;
      --tagline-teal: #00AA99;
      --black: #000000;
      --white: #ffffff;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--black);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─ MAIN CARD ─ */
    .card {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      background: var(--neon);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 20px;
      position: relative;
      overflow: hidden;
    }

    /* ─ SPLATTER OVERLAY ─ */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 10% 95%, rgba(0,0,0,0.06) 0%, transparent 50%),
        radial-gradient(circle at 92% 88%, rgba(0,0,0,0.05) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .card > * { position: relative; z-index: 1; }

    /* ─ CROWN ─ */
    .crown {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 4px;
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2));
    }

    /* ─ LOGO ─ */
    .logo-wrap {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .logo-row {
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .logo-word {
      font-family: 'Bangers', system-ui, sans-serif;
      font-size: clamp(52px, 14vw, 84px);
      line-height: 0.85;
      color: var(--hot-pink);
      text-shadow:
        3px 3px 0 var(--black),
        -1px -1px 0 var(--black),
        1px -1px 0 var(--black),
        -1px 1px 0 var(--black),
        1px 1px 0 var(--black),
        -3px 0 0 var(--black),
        3px 0 0 var(--black),
        0 -3px 0 var(--black),
        0 3px 0 var(--black),
        4px 4px 0 rgba(0,0,0,0.15);
      letter-spacing: 2px;
      transform: rotate(-0.5deg);
    }

    .logo-and {
      font-family: 'Caveat', cursive;
      font-size: clamp(24px, 6vw, 36px);
      color: var(--script-green);
      text-shadow:
        1px 1px 0 var(--black),
        -1px -1px 0 var(--black),
        1px -1px 0 var(--black),
        -1px 1px 0 var(--black);
      margin: 0 4px;
      transform: rotate(-3deg);
    }

    /* ─ TAGLINE ─ */
    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(16px, 4vw, 22px);
      color: var(--tagline-teal);
      text-shadow:
        1.5px 1.5px 0 var(--black),
        -0.5px -0.5px 0 var(--black),
        0.5px -0.5px 0 var(--black),
        -0.5px 0.5px 0 var(--black),
        0.5px 0.5px 0 var(--black);
      line-height: 1.2;
      margin-top: 4px;
    }
    .tagline span { display: block; }
    .tagline span:last-child { padding-left: 1.2em; }

    /* ─ DIVIDER ─ */
    .divider {
      width: 80%;
      max-width: 260px;
      height: 3px;
      background: var(--black);
      border-radius: 2px;
      margin: 20px 0 18px;
      opacity: 0.7;
    }

    /* ─ CTA SECTION ─ */
    .tip-section {
      width: 100%;
      text-align: center;
      margin-bottom: 16px;
    }

    .tip-label {
      font-family: 'Bangers', system-ui, sans-serif;
      font-size: clamp(22px, 5vw, 30px);
      color: var(--black);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .venmo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      padding: 18px 28px;
      background: var(--hot-pink);
      color: var(--white);
      font-family: 'Bangers', system-ui, sans-serif;
      font-size: clamp(24px, 5vw, 32px);
      letter-spacing: 2px;
      text-decoration: none;
      border: 3px solid var(--black);
      border-radius: 16px;
      box-shadow: 5px 5px 0 var(--black);
      transition: transform 0.1s, box-shadow 0.1s;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .venmo-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 var(--black);
    }

    .venmo-btn svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .venmo-sub {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(12px, 2.8vw, 14px);
      color: var(--black);
      margin-top: 8px;
      opacity: 0.7;
    }

    .venmo-sub a {
      color: var(--black);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ─ QR CODE ─ */
    .qr-wrap {
      margin: 6px 0 10px;
      text-align: center;
    }

    #qrcode {
      display: inline-block;
      background: var(--white);
      padding: 8px;
      border: 3px solid var(--black);
      border-radius: 12px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.15);
    }

    #qrcode canvas {
      display: block !important;
      width: 160px;
      height: 160px;
    }

    .qr-label {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      color: var(--black);
      margin-top: 6px;
      opacity: 0.6;
    }

    /* ─ VENMO ICON (inline SVG) ─ */
    .venmo-icon {
      display: inline-block;
    }

    /* ─ FOOTER LINKS ─ */
    .footer-links {
      width: 100%;
      max-width: 340px;
      margin-top: auto;
      padding-top: 16px;
      padding-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(14px, 3.2vw, 16px);
      font-weight: 600;
      text-decoration: none;
      border: 2px solid var(--black);
      border-radius: 12px;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .footer-link:active {
      transform: scale(0.97);
    }

    .footer-link.instagram {
      background: var(--black);
      color: var(--white);
    }

    .footer-link.instagram svg { width: 20px; height: 20px; fill: currentColor; }

    .footer-link.mailing-list {
      background: var(--tagline-teal);
      color: var(--white);
    }

    .footer-link.mailing-list svg { width: 18px; height: 18px; fill: currentColor; }

    .footer-brand {
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      margin-top: 6px;
      padding-bottom: 4px;
    }

    /* ─ DRIP ACCENTS ─ */
    .drip {
      position: absolute;
      background: var(--black);
      border-radius: 50%;
      pointer-events: none;
    }
    .drip-1 { width: 14px; height: 18px; top: 72px; right: 28px; transform: rotate(8deg); border-radius: 0 0 50% 50%; }
    .drip-2 { width: 8px; height: 24px; bottom: 120px; left: 24px; transform: rotate(-5deg); border-radius: 0 0 50% 50%; }
    .drip-3 { width: 6px; height: 14px; top: 140px; left: 18px; transform: rotate(-12deg); border-radius: 0 0 50% 50%; }

    /* ─ SPARKLE ─ */
    .sparkle {
      position: absolute;
      font-size: 36px;
      color: var(--black);
      opacity: 0.5;
      top: 34px; left: 18px;
      transform: rotate(15deg);
      line-height: 1;
      user-select: none;
    }

    /* ─ RESPONSIVE ─ */
    @media (min-width: 480px) {
      .card {
        border-radius: 0;
        min-height: 100dvh;
      }
    }

    @media (max-height: 700px) {
      .card { padding: 20px 20px 12px; }
      .crown { font-size: 36px; }
      .logo-word { font-size: clamp(40px, 12vw, 60px); }
      .divider { margin: 12px 0 10px; }
      .venmo-btn { padding: 14px 20px; }
      #qrcode canvas { width: 120px !important; height: 120px !important; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="sparkle">✦</div>
  <div class="drip drip-1"></div>
  <div class="drip drip-2"></div>
  <div class="drip drip-3"></div>

  <!-- CROWN -->
  <div class="crown">👑</div>

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-main">
      <div class="logo-row">
        <span class="logo-word">SORBET</span>
      </div>
      <div class="logo-row" style="justify-content:center;">

  <div class="divider"></div>

      </svg>
      Tip with Venmo
    </a>

    <div class="venmo-sub">
      Or visit <a href="https://venmo.com/u/Jesse-Gordon-1" target="_blank">venmo.com/u/Jesse-Gordon-1</a>

  </div>

  <!-- QR CODE -->
  <div class="qr-wrap">
    <div id="qrcode"></div>
    <div class="qr-label">Scan to open this page</div>

  <!-- FOOTER -->
  <div class="footer-links">
    <a class="footer-link instagram" href="https://instagram.com/SorbetandDestroy" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>

</div>

<!-- QR CODE LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // Generate QR code pointing to this page's URL
  new QRCode(document.getElementById('qrcode'), {
    text: window.location.href,
    width: 160,
    height: 160,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  // Venmo deep link handler
  function handleVenmoClick(e) {
    // On mobile, the deep link (venmo://) opens the app.
    // The fallback href is already set in the <a> tag.
    // We just let the native behavior happen.
    // If it's desktop (no Venmo app), it'll fail silently,
    // so we show the web URL as a fallback below the button.
  }

  // Set deep link as primary, fallback web URL in the href
  // for browsers that can't handle venmo://
  const btn = document.getElementById('venmoLink');
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (!isMobile) {
    // On desktop, use web URL directly
    btn.href = 'https://venmo.com/u/Jesse-Gordon-1';
  }
</script>

</body>
</html>
